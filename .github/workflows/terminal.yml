name: Ubuntu Web Terminal

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */5 * * *'  # প্রতি ৫ ঘণ্টায় auto restart

jobs:
  terminal:
    runs-on: ubuntu-latest
    steps:
      - name: Install ttyd
        run: sudo apt-get install -y ttyd

      - name: Install cloudflared
        run: |
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Start Terminal & Get URL
        run: |
          pkill ttyd || true
          ttyd --writable -p 8080 bash &
          sleep 2
          ./cloudflared tunnel --url http://localhost:8080 2>&1 | tee /tmp/cf.log &
          sleep 10
          grep -o 'https://[a-z0-9-]*.trycloudflare.com' /tmp/cf.log
          sleep 21600